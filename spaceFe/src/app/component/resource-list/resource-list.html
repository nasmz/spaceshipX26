<div>
    <table class="table table-striped table-bordered">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Access Level</th>
    </tr>
  </thead>
  <tbody>
    <!-- Traditional ngFor structural directive loop -->
    <tr *ngFor="let item of resources">
      <td>{{ item.id }}</td>
      <td><strong>{{ item.name }}</strong></td>
      <td>{{ item.accessLevel }}</td>
    </tr>
    
    <!-- Fallback if array is empty -->
    <tr *ngIf="resources.length === 0">
      <td colspan="3">No resources found in the inventory.</td>
    </tr>
  </tbody>
</table>
</div>
